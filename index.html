<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List App</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #222222;
      --text-dim: #777777;
      --accent: #3e8e7e;
      --border: #e0e0e0;
      --done: #aaaaaa;
    }
    * { box-sizing: border-box; }
    body {
      max-width: 480px;
      margin: 3rem auto;
      padding: 0 1rem;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    .input-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    #taskInput {
      flex: 1;
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 1rem;
    }
    #addButton {
      padding: 0.6rem 1rem;
      border: none;
      border-radius: 4px;
      background: var(--accent);
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }
    #addButton:hover { opacity: 0.9; }
    #taskList {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    #taskList li {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.6rem 0.75rem;
      margin-bottom: 0.5rem;
    }
    #taskList li .task-text {
      flex: 1;
      word-break: break-word;
    }
    #taskList li.completed .task-text {
      text-decoration: line-through;
      color: var(--done);
    }
    .delete-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 1.1rem;
      cursor: pointer;
      line-height: 1;
      padding: 0.2rem 0.4rem;
    }
    .delete-btn:hover { color: #c0392b; }
    #emptyState {
      color: var(--text-dim);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <h1>My To-Do List</h1>

  <div class="input-row">
    <input type="text" id="taskInput" placeholder="Add a new task" data-testid="task-input">
    <button id="addButton" data-testid="add-button">Add Task</button>
  </div>

  <p id="emptyState" data-testid="empty-state">No tasks yet. Add one above.</p>
  <ul id="taskList" data-testid="task-list"></ul>

  <script>
    const STORAGE_KEY = 'todo-list-tasks';

    const taskInput = document.getElementById('taskInput');
    const addButton = document.getElementById('addButton');
    const taskList = document.getElementById('taskList');
    const emptyState = document.getElementById('emptyState');

    function loadTasks() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      try {
        return JSON.parse(raw);
      } catch {
        return [];
      }
    }

    function saveTasks(tasks) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    let tasks = loadTasks();

    function render() {
      taskList.innerHTML = '';
      emptyState.style.display = tasks.length === 0 ? 'block' : 'none';

      tasks.forEach((task, index) => {
        const li = document.createElement('li');
        li.dataset.testid = 'task-item';
        if (task.completed) li.classList.add('completed');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = task.completed;
        checkbox.dataset.testid = 'task-checkbox';
        checkbox.addEventListener('change', () => toggleTask(index));

        const span = document.createElement('span');
        span.className = 'task-text';
        span.textContent = task.text;

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.textContent = '✕';
        deleteBtn.dataset.testid = 'delete-button';
        deleteBtn.setAttribute('aria-label', `Delete "${task.text}"`);
        deleteBtn.addEventListener('click', () => deleteTask(index));

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(deleteBtn);
        taskList.appendChild(li);
      });
    }

    function addTask() {
      const text = taskInput.value.trim();
      if (text === '') return;
      tasks.push({ text, completed: false });
      saveTasks(tasks);
      taskInput.value = '';
      render();
    }

    function toggleTask(index) {
      tasks[index].completed = !tasks[index].completed;
      saveTasks(tasks);
      render();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      saveTasks(tasks);
      render();
    }

    addButton.addEventListener('click', addTask);
    taskInput.addEventListener('keypress', (event) => {
      if (event.key === 'Enter') addTask();
    });

    render();
  </script>
</body>
</html>
